# ============================================================================
# PROMETHEUS ALERTING RULES
# Configure alerting for critical metrics
# 
# Load this in Prometheus:
#   prometheus --config.file=prometheus.yml --storage.tsdb.path=./data
# ============================================================================

groups:
  - name: hrms_application
    interval: 30s
    rules:
      # Application health
      - alert: ApplicationDown
        expr: up{job="hrms-pro"} == 0
        for: 1m
        labels:
          severity: critical
          team: devops
        annotations:
          summary: "HRMS Pro application is down"
          description: "Application {{ $labels.instance }} has been down for more than 1 minute."

      # High error rate
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          team: devops
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value }} errors per second (threshold: 0.1/s)."

      # High response time
      - alert: HighResponseTime
        expr: histogram_quantile(0.95, http_request_duration_seconds) > 2
        for: 5m
        labels:
          severity: warning
          team: devops
        annotations:
          summary: "High API response time"
          description: "95th percentile response time is {{ $value }}s (threshold: 2s)."

  - name: hrms_database
    interval: 30s
    rules:
      # Database connection issues
      - alert: DatabaseConnectionFailed
        expr: hrms_database_health == 0
        for: 2m
        labels:
          severity: critical
          team: devops
        annotations:
          summary: "Database connection failed"
          description: "Unable to connect to database for more than 2 minutes."

      # High database query time
      - alert: SlowDatabaseQueries
        expr: hrms_db_query_duration_seconds{quantile="0.95"} > 1
        for: 5m
        labels:
          severity: warning
          team: devops
        annotations:
          summary: "Slow database queries detected"
          description: "95th percentile query time is {{ $value }}s (threshold: 1s)."

  - name: hrms_redis
    interval: 30s
    rules:
      # Redis connection issues
      - alert: RedisConnectionFailed
        expr: hrms_redis_health == 0
        for: 2m
        labels:
          severity: critical
          team: devops
        annotations:
          summary: "Redis connection failed"
          description: "Unable to connect to Redis for more than 2 minutes."

      # High Redis memory usage
      - alert: HighRedisMemoryUsage
        expr: redis_used_memory_bytes / redis_max_memory_bytes > 0.9
        for: 5m
        labels:
          severity: warning
          team: devops
        annotations:
          summary: "Redis memory usage high"
          description: "Redis is using {{ $value | humanizePercentage }} of max memory."

  - name: hrms_resources
    interval: 30s
    rules:
      # High memory usage
      - alert: HighMemoryUsage
        expr: (node_memory_rss_bytes / node_memory_MemTotal_bytes) > 0.85
        for: 5m
        labels:
          severity: warning
          team: devops
        annotations:
          summary: "High memory usage"
          description: "Memory usage is {{ $value | humanizePercentage }} (threshold: 85%)."

      # High CPU usage
      - alert: HighCPUUsage
        expr: rate(node_cpu_seconds_total{mode!="idle"}[5m]) > 0.8
        for: 5m
        labels:
          severity: warning
          team: devops
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is {{ $value | humanizePercentage }} (threshold: 80%)."

      # Disk space low
      - alert: LowDiskSpace
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.2
        for: 5m
        labels:
          severity: warning
          team: devops
        annotations:
          summary: "Low disk space"
          description: "Available disk space is {{ $value | humanizePercentage }} (threshold: 20%)."

  - name: hrms_business
    interval: 1m
    rules:
      # High rate limiting
      - alert: HighRateLimiting
        expr: rate(hrms_rate_limit_blocked_total[5m]) > 10
        for: 5m
        labels:
          severity: warning
          team: security
        annotations:
          summary: "High rate limiting activity"
          description: "{{ $value }} requests per second are being rate limited (possible attack)."

      # Failed authentication attempts
      - alert: HighFailedAuthAttempts
        expr: rate(hrms_auth_failures_total[5m]) > 5
        for: 5m
        labels:
          severity: warning
          team: security
        annotations:
          summary: "High failed authentication attempts"
          description: "{{ $value }} failed auth attempts per second (possible attack)."
